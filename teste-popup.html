<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teste Popup</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f5f5f5; }
    .topo { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #888; }
    .planos { height: 100vh; display: flex; align-items: center; justify-content: center; background: #F4EEF2; font-size: 1.2rem; color: #B090A5; font-weight: bold; }
  </style>
</head>
<body>

  <div class="topo">⬇️ Role para baixo para ver os planos</div>

  <div id="planos" class="planos">📋 Seção de Planos — popup vai aparecer aqui</div>

  <script>
    var _shown = false;

    function mostrarPopup() {
      if (_shown) return;
      _shown = true;

      var d = new Date(); d.setDate(d.getDate() + 3);
      var dataLimite = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' });
      var msg = 'Quero meu bônus! \n\nVi os bônus exclusivos no site e quero garantir os dois antes do prazo:\n- Órtese Espuma Pós-Parto\n- Rosquinha de Amamentação\n\nPode me passar mais informações sobre o acompanhamento?';
      var wpp = 'https://wa.me/5583999254499?text=' + encodeURIComponent(msg);

      var el = document.createElement('div');
      el.id = 'bonus-popup';
      el.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;background:#B090A5;overflow-y:auto;';
      el.innerHTML = '<div style="max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;">'
        + '<div style="background:#B090A5;padding:20px;text-align:center;">'
          + '<div style="display:inline-block;background:rgba(255,255,255,0.2);color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:10px;">Oferta por tempo limitado</div>'
          + '<div style="color:#fff;font-size:22px;font-weight:800;line-height:1.25;">Feche nos próximos <u>3 dias</u><br>e ganhe 2 bônus exclusivos</div>'
        + '</div>'
        + '<div style="background:#FBF6EE;flex:1;padding:20px;display:flex;flex-direction:column;justify-content:space-between;">'
          + '<div>'
            + '<p style="color:#7A6872;font-size:14px;text-align:center;margin:0 0 16px;line-height:1.6;">Para ganhar os bônus: feche um <b style="color:#2A2028;">pacote de pós-parto</b> até <b style="color:#B090A5;">' + dataLimite + '</b> e envie a mensagem abaixo no WhatsApp.</p>'
            + '<div style="display:flex;gap:12px;background:#F4EEF2;border-radius:12px;padding:14px;margin-bottom:10px;">'
              + '<div style="min-width:40px;height:40px;border-radius:50%;background:#B090A5;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🎗️</div>'
              + '<div><b style="color:#2A2028;font-size:14px;display:block;margin-bottom:4px;">Órtese Espuma Pós-Parto</b><span style="color:#7A6872;font-size:13px;line-height:1.5;">Órtese em espuma usada após a cesárea para estabilizar a cicatriz, promovendo compressão uniforme — evitando inchaço e prevenindo a "bolsinha" acima da cicatriz.</span></div>'
            + '</div>'
            + '<div style="display:flex;gap:12px;background:#F4EEF2;border-radius:12px;padding:14px;margin-bottom:20px;">'
              + '<div style="min-width:40px;height:40px;border-radius:50%;background:#B090A5;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🤱</div>'
              + '<div><b style="color:#2A2028;font-size:14px;display:block;margin-bottom:4px;">Rosquinha de Amamentação</b><span style="color:#7A6872;font-size:13px;line-height:1.5;">Protetor de mamilo que evita o contato com o sutiã quando está sensível — amamentação mais confortável sem precisar parar.</span></div>'
            + '</div>'
          + '</div>'
          + '<div>'
            + '<a href="' + wpp + '" target="_blank" style="display:block;text-align:center;background:#25D366;color:#fff;font-size:16px;font-weight:800;padding:18px;border-radius:12px;text-decoration:none;margin-bottom:8px;">Quero meu bônus! — Mandar mensagem agora</a>'
            + '<p style="color:#B0A0AA;font-size:12px;text-align:center;margin:0 0 6px;">A mensagem já vem preenchida — é só enviar.</p>'
            + '<button onclick="document.getElementById(\'bonus-popup\').remove()" style="display:block;width:100%;background:none;border:none;color:#C8C0C5;font-size:12px;cursor:pointer;padding:8px 0 16px;text-decoration:underline;">Não quero os bônus</button>'
          + '</div>'
        + '</div>'
      + '</div>';

      document.body.appendChild(el);
    }

    var intervalo = setInterval(function () {
      var sec = document.getElementById('planos');
      if (!sec) return;
      var rect = sec.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        clearInterval(intervalo);
        mostrarPopup();
      }
    }, 300);
  </script>

</body>
</html>
