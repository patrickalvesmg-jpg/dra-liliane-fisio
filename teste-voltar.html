<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teste Voltar</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
    #log { background: #222; color: #0f0; font-family: monospace; font-size: 14px; padding: 16px; border-radius: 8px; margin-top: 16px; line-height: 2; }
    h2 { margin-bottom: 8px; }
    p { color: #555; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2>Teste do botão Voltar</h2>
  <p>Role para baixo, depois aperte Voltar no celular e veja o que aparece no log abaixo.</p>
  <div style="height:120vh;background:linear-gradient(#eee,#ddd);border-radius:8px;display:flex;align-items:center;justify-content:center;">
    <p style="color:#888;">Role até aqui</p>
  </div>
  <div id="log">aguardando...</div>

  <script>
    var log = document.getElementById('log');
    function add(msg) {
      log.innerHTML += '<br>' + new Date().toLocaleTimeString() + ' — ' + msg;
    }

    add('página carregada');
    add('sessionStorage planosVisto = ' + sessionStorage.getItem('planosVisto'));

    history.pushState({ bonusGuard: true }, '');
    add('pushState executado');

    window.addEventListener('popstate', function(e) {
      add('POPSTATE DISPAROU! state=' + JSON.stringify(e.state));
      sessionStorage.setItem('planosVisto', '1');
      history.pushState({ bonusGuard: true }, '');
      add('redirecionando para saida.html...');
      setTimeout(function() {
        window.location.href = '/saida.html';
      }, 500);
    });

    document.addEventListener('visibilitychange', function() {
      add('visibilitychange: ' + document.visibilityState);
    });

    add('listeners registrados — aperte Voltar');
  </script>
</body>
</html>
